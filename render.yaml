services:
  - type: web
    name: story-video-maker
    runtime: node
    region: oregon
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install &&
      BASE_PATH=/ pnpm --filter @workspace/story-video-maker run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PEXELS_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: story-video-maker-db
          property: connectionString

databases:
  - name: story-video-maker-db
    region: oregon
    plan: free
    databaseName: storyvideomaker
    user: storyapp

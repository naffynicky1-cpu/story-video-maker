openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: images
    description: Image search and collection
  - name: video
    description: Video slideshow creation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /images/search:
    post:
      operationId: searchImages
      tags: [images]
      summary: Search images for a story prompt
      description: Searches the web for images matching the given text prompt and returns image URLs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchImagesBody"
      responses:
        "200":
          description: List of image results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchImagesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [video]
      summary: List all saved story video projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [video]
      summary: Save a story video project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [video]
      summary: Get a specific project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [video]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SearchImagesBody:
      type: object
      properties:
        prompt:
          type: string
          description: The story or description text to search images for
        count:
          type: integer
          description: Number of images to return (default 8, max 20)
      required:
        - prompt

    ImageResult:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
      required:
        - url
        - title

    SearchImagesResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageResult"
        query:
          type: string
      required:
        - images
        - query

    ProjectImage:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        caption:
          type: ["string", "null"]
        durationMs:
          type: integer
          description: How long this image shows in ms (default 3000)
      required:
        - url
        - title
        - durationMs

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        storyText:
          type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImage"
        createdAt:
          type: string
      required:
        - id
        - title
        - storyText
        - images
        - createdAt

    CreateProjectBody:
      type: object
      properties:
        title:
          type: string
        storyText:
          type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImage"
      required:
        - title
        - storyText
        - images

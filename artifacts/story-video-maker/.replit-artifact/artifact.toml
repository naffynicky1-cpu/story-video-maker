kind = "web"
previewPath = "/"
title = "Story Video Maker"
version = "1.0.0"
id = "artifacts/story-video-maker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22288

[services.development]
run = "pnpm --filter @workspace/story-video-maker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/story-video-maker", "run", "build" ]
publicDir = "artifacts/story-video-maker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22288"
BASE_PATH = "/"
